version: '3.8'

services:
  # ─── PostgreSQL Database ──────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: cms_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: container_mgmt
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/migrations/001_create_tables.sql:/docker-entrypoint-initdb.d/01_tables.sql
      - ./backend/migrations/002_seed_data.sql:/docker-entrypoint-initdb.d/02_seed.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d container_mgmt"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend CMS (FastAPI) ────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cms_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://admin:secret@db:5432/container_mgmt
      PORT: 8001
      NODE_ENV: production
      CORS_ORIGINS: http://localhost,http://frontend
      OCR_SERVICE_URL: http://ocr:8000
    ports:
      - "8001:8001"
    depends_on:
      db:
        condition: service_healthy

  # ─── OCR Service (existing FastAPI + TF 1.15) ─────────────
  ocr:
    build:
      context: ./container-recognition-api
      dockerfile: Dockerfile
    container_name: cms_ocr
    restart: unless-stopped
    ports:
      - "8000:8000"

  # ─── Frontend (React + Nginx) ─────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cms_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
